<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="/static/style.css">
<title>Oracle Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#f4f6f9;
}

.sidebar{
width:220px;
background:#2c3e50;
height:100vh;
color:white;
}

.sidebar h2{
padding:15px;
}

.sidebar button{
width:100%;
padding:14px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:#34495e;
}

.content{
flex:1;
padding:25px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#3498db;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Dashboard</h2>


<button onclick="loadData('Grade_Wise_Vacancy')">Grade_Wise_Vacancy</button>
<button onclick="loadData('Circle_Wise_Vacancy')">Circle_Wise_Vacancy</button>
<button onclick="loadData('Job_Wise_Vacancy')">Job_Wise_Vacancy</button>
<button onclick="loadData('3_Levels_of_Organization_Hierarchy_Vacancy')">3_Levels_of_Organization Hierarchy_Vacancy</button>
<button onclick="loadData('Retirement_Forecast')">Retirement_Forecast</button>
<button onclick="loadData('Sub_Division_Wise_Vacancy')">Sub_Division_Wise_Vacancy</button>
<button onclick="downloadData()">Download_Excel</button>

</div>

<div class="content">



<h2>Results</h2>

<input id="search" placeholder="Search..." onkeyup="filterTable()">

<br><br>

<div id="table"></div>

</div>

<script src="/static/script.js"></script>

<hr style="border: 0.5px solid #34495e; margin: 20px 0;">
<button onclick="window.location.href='/logout'" style="color: #e74c3c;">Logout</button>


</body>
</html>
