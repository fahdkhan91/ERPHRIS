<!DOCTYPE html>
<html>

<head>

<title>Oracle Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
background:#f4f6f9;
}

.sidebar{
width:220px;
background:#2c3e50;
height:100vh;
color:white;
}

.sidebar h2{
padding:15px;
}

.sidebar button{
width:100%;
padding:14px;
border:none;
background:none;
color:white;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
background:#34495e;
}

.content{
flex:1;
padding:25px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#3498db;
color:white;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Dashboard</h2>

<button onclick="loadData('Grade Wise Vacancy')">Grade Wise Vacancy</button>
<button onclick="loadData('Circle Wise Vacancy')">Circle Wise Vacancy</button>
<button onclick="loadData('Job Wise Vacancy')">Job Wise Vacancy</button>
<button onclick="loadData('3 Levels of Organization Hierarchy Vacancy')">3 Levels of Organization Hierarchy Vacancy</button>
<button onclick="loadData('Retirement Forecast')">Retirement Forecast</button>
<button onclick="loadData('Sub Division Wise Vacancy')">Sub Division Wise Vacancy</button>
<button onclick="loadData('Payroll Detail')">Payroll Detail</button>

</div>

<div class="content">

<h2>Results</h2>

<input id="search" placeholder="Search..." onkeyup="fetchData()">

<br><br>

<div id="table"></div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
